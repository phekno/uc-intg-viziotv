services:
  uc-intg-viziotv:
    build: .
    image: ghcr.io/phekno/uc-intg-viziotv:latest
    container_name: uc-intg-viziotv
    # Host networking is REQUIRED for:
    #   - Zeroconf/mDNS discovery of Vizio TVs (multicast UDP)
    #   - mDNS advertisement so the Remote Two/3 can discover this integration
    #   - Wake-on-LAN magic packets (broadcast UDP)
    # NOTE: Only works on Linux. On macOS with podman/Docker Desktop,
    # use manual IP entry in the setup flow instead.
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./config:/config
    environment:
      - UC_DISABLE_MDNS_PUBLISH=false
      - UC_INTEGRATION_INTERFACE=0.0.0.0
      - UC_INTEGRATION_HTTP_PORT=9090
      - UC_CONFIG_HOME=/config
      - UC_LOG_LEVEL=DEBUG
