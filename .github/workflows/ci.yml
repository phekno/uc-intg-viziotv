name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check intg-viziotv/

      - name: Ruff format check
        run: ruff format --check intg-viziotv/

      - name: Python syntax check
        run: python -m py_compile intg-viziotv/*.py

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t uc-intg-viziotv:ci .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t uc-intg-viziotv:ci .

      - name: Scan image with Grype
        uses: anchore/scan-action@v6
        id: scan
        with:
          image: uc-intg-viziotv:ci
          fail-build: false
          severity-cutoff: critical

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
